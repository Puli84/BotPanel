<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BotPanel — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #1a0a16;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .logo span { color: #25d366; }

    .subtitulo {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input {
      width: 100%;
      background: #1a2235;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: #25d366; }

    button {
      width: 100%;
      background: #25d366;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 24px;
    }

    button:hover { background: #1db954; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .mensaje {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .mensaje.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      display: block;
    }

    .mensaje.exito {
      background: rgba(37,211,102,0.15);
      border: 1px solid rgba(37,211,102,0.3);
      color: #25d366;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Bot<span>Panel</span></div>
    <div class="subtitulo">Panel de gestión de bots de WhatsApp</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="admin@botpanel.com" />

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button id="btnLogin" onclick="login()">Entrar</button>

    <div class="mensaje" id="mensaje"></div>
  </div>

  <script src="auth.js"></script>
  <script>
    async function login() {
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        mostrarMensaje("Por favor rellena todos los campos", "error");
        return;
      }

      const btn = document.getElementById("btnLogin");
      btn.disabled = true;
      btn.textContent = "Entrando...";

      try {
        // fetch() hace la petición HTTP a nuestra API
        const respuesta = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const datos = await respuesta.json();

        if (respuesta.ok) {
          // Guardamos el token en localStorage para usarlo en otras páginas
          localStorage.setItem("token", datos.token);
          localStorage.setItem("nombre", datos.nombre);
          localStorage.setItem("email", datos.email);
          localStorage.setItem("rol", datos.rol);
          localStorage.setItem("empresaId", datos.empresaId);

          mostrarMensaje("¡Bienvenido " + datos.nombre + "!", "exito");

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);

        } else {
          mostrarMensaje(datos.error || "Email o contraseña incorrectos", "error");
        }

      } catch (error) {
        mostrarMensaje("No se puede conectar con el servidor. ¿Está arrancado Spring Boot?", "error");
      }

      btn.disabled = false;
      btn.textContent = "Entrar";
    }

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById("mensaje");
      div.textContent = texto;
      div.className = "mensaje " + tipo;
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    // Si ya hay sesión iniciada, vamos al dashboard directamente
    window.onload = () => {
      if (localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
      }
    };
  </script>

</body>
</html>
