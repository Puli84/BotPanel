<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BotPanel — Empresas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0e1a; color: #e2e8f0; display: flex; min-height: 100vh; }

    .sidebar { width: 220px; background: #111827; border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 12px; }
    .logo { font-size: 22px; font-weight: bold; padding: 0 8px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
    .logo span { color: #25d366; }
    .nav-item { display: block; padding: 10px 12px; border-radius: 8px; color: #64748b; text-decoration: none; font-size: 14px; margin-bottom: 4px; }
    .nav-item:hover { background: #1a2235; color: #e2e8f0; }
    .nav-item.activo { background: rgba(37,211,102,0.1); color: #25d366; }
    .sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.07); padding-top: 16px; }
    .usuario-info { font-size: 13px; padding: 0 8px 12px; }
    .usuario-nombre { font-weight: bold; margin-bottom: 2px; }
    .usuario-rol { font-size: 11px; color: #25d366; background: rgba(37,211,102,0.1); display: inline-block; padding: 2px 8px; border-radius: 10px; }
    .btn-salir { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #64748b; border-radius: 8px; padding: 8px; cursor: pointer; font-size: 13px; margin-top: 8px; }
    .btn-salir:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    .contenido { margin-left: 220px; flex: 1; padding: 32px; }
    .header-pagina { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .titulo-pagina { font-size: 24px; font-weight: bold; }
    .subtitulo-pagina { color: #64748b; font-size: 14px; margin-top: 4px; }

    .btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-verde { background: #25d366; color: #000; }
    .btn-verde:hover { background: #1db954; }
    .btn-rojo { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .btn-rojo:hover { background: rgba(239,68,68,0.25); }

    .seccion { background: #111827; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
    .seccion-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); font-weight: bold; font-size: 15px; }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 20px; text-align: left; font-size: 11px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.07); }
    td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .badge-verde { background: rgba(37,211,102,0.15); color: #25d366; }
    .cargando { padding: 32px; text-align: center; color: #64748b; }

    /* ── MODAL ── */
    .modal-fondo {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-fondo.visible { display: flex; }

    .modal {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
    }

    .modal h2 { font-size: 18px; margin-bottom: 24px; }

    label { display: block; font-size: 12px; color: #64748b; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; background: #1a2235; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; }
    input:focus { border-color: #25d366; }

    .modal-botones { display: flex; gap: 10px; margin-top: 24px; }
    .btn-gris { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #64748b; padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }

    .mensaje { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .mensaje.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; display: block; }
    .mensaje.exito { background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.3); color: #25d366; display: block; }

    .separador { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 20px 0; }
    .separador-texto { font-size: 12px; color: #64748b; text-align: center; margin: -10px 0 16px; background: #111827; display: inline-block; padding: 0 10px; }
    .separador-wrap { text-align: center; position: relative; }
    .separador-wrap::before { content: ''; display: block; border-top: 1px solid rgba(255,255,255,0.07); margin: 16px 0; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">Bot<span>Panel</span></div>
    <a href="dashboard.html" class="nav-item">⚡ Dashboard</a>
    <a href="empresas.html"  class="nav-item activo">🏢 Empresas</a>
    <a href="bots.html"      class="nav-item">🤖 Bots</a>
    <a href="metricas.html"    class="nav-item">📊 Métricas</a>
<a href="solicitudes.html" class="nav-item">📋 Solicitudes</a>
    <div class="sidebar-bottom">
      <div class="usuario-info">
        <div class="usuario-nombre" id="nombreUsuario">...</div>
        <span class="usuario-rol" id="rolUsuario">...</span>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </aside>

  <main class="contenido">
    <div class="header-pagina">
      <div>
        <div class="titulo-pagina">🏢 Empresas</div>
        <div class="subtitulo-pagina">Gestiona las empresas cliente de BotPanel</div>
      </div>
      <button class="btn btn-verde" onclick="abrirModal()">+ Nueva empresa</button>
    </div>

    <div class="seccion">
      <div class="seccion-header">Empresas registradas</div>
      <div id="listaEmpresas" class="cargando">Cargando...</div>
    </div>
  </main>

  <!-- MODAL: Nueva empresa -->
  <div class="modal-fondo" id="modalFondo">
    <div class="modal">
      <h2>➕ Nueva empresa</h2>

      <label>Nombre de la empresa</label>
      <input id="nombre" placeholder="Ej: Restaurante El Rincón" />

      <label>Email de la empresa</label>
      <input id="emailEmpresa" type="email" placeholder="contacto@empresa.com" />

      <div class="separador-wrap">
        <div style="border-top:1px solid rgba(255,255,255,0.07);margin:20px 0"></div>
        <div style="font-size:12px;color:#64748b;margin-top:-30px;background:#111827;display:inline-block;padding:0 10px">
          Datos del administrador de esta empresa
        </div>
      </div>

      <label>Nombre del admin</label>
      <input id="adminNombre" placeholder="Ej: Carlos López" />

      <label>Email del admin</label>
      <input id="adminEmail" type="email" placeholder="carlos@empresa.com" />

      <label>Contraseña del admin</label>
      <input id="adminPassword" type="password" placeholder="••••••••" />

      <div class="mensaje" id="mensajeModal"></div>

      <div class="modal-botones">
        <button class="btn btn-verde" onclick="crearEmpresa()">Crear empresa</button>
        <button class="btn-gris" onclick="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    window.onload = async () => {
      if (!verificarSesion()) return;
      if (!esSuperAdmin()) {
        alert("Solo el Super Admin puede acceder a esta sección.");
        window.location.href = "dashboard.html";
        return;
      }
      const u = getUsuario();
      document.getElementById("nombreUsuario").textContent = u.nombre;
      document.getElementById("rolUsuario").textContent    = u.rol;
      cargarEmpresas();
    };

    async function cargarEmpresas() {
      const respuesta = await apiFetch("/api/empresas");
      const empresas  = await respuesta.json();

      if (empresas.length === 0) {
        document.getElementById("listaEmpresas").innerHTML =
          '<p style="padding:24px;color:#64748b">No hay empresas. Crea la primera con el botón de arriba.</p>';
        return;
      }

      let html = `
        <table>
          <thead><tr>
            <th>ID</th><th>Nombre</th><th>Email</th><th>Alta</th><th>Estado</th><th>Acciones</th>
          </tr></thead>
          <tbody>
      `;

      empresas.forEach(e => {
        html += `
          <tr>
            <td>${e.id}</td>
            <td><strong>${e.nombre}</strong></td>
            <td>${e.email}</td>
            <td>${e.creadoEn}</td>
            <td><span class="badge badge-verde">Activa</span></td>
            <td>
              <button class="btn btn-rojo" onclick="eliminarEmpresa(${e.id}, '${e.nombre}')">
                Eliminar
              </button>
            </td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      document.getElementById("listaEmpresas").innerHTML = html;
    }

    async function crearEmpresa() {
      const datos = {
        nombre:        document.getElementById("nombre").value,
        email:         document.getElementById("emailEmpresa").value,
        adminNombre:   document.getElementById("adminNombre").value,
        adminEmail:    document.getElementById("adminEmail").value,
        adminPassword: document.getElementById("adminPassword").value
      };

      if (!datos.nombre || !datos.email || !datos.adminNombre || !datos.adminEmail || !datos.adminPassword) {
        mostrarMensajeModal("Rellena todos los campos", "error");
        return;
      }

      const respuesta = await apiFetch("/api/empresas", {
        method: "POST",
        body: JSON.stringify(datos)
      });

      const resultado = await respuesta.json();

      if (respuesta.ok) {
        mostrarMensajeModal("✅ Empresa creada correctamente", "exito");
        setTimeout(() => {
          cerrarModal();
          cargarEmpresas();
        }, 1500);
      } else {
        mostrarMensajeModal(resultado.error || "Error al crear la empresa", "error");
      }
    }

    async function eliminarEmpresa(id, nombre) {
      if (!confirm(`¿Seguro que quieres eliminar "${nombre}"? Se borrarán todos sus bots y conversaciones.`)) return;

      const respuesta = await apiFetch(`/api/empresas/${id}`, { method: "DELETE" });

      if (respuesta.ok) {
        cargarEmpresas();
      } else {
        alert("Error al eliminar la empresa.");
      }
    }

    function abrirModal()  { document.getElementById("modalFondo").classList.add("visible"); }
    function cerrarModal() { document.getElementById("modalFondo").classList.remove("visible"); }

    function mostrarMensajeModal(texto, tipo) {
      const div = document.getElementById("mensajeModal");
      div.textContent = texto;
      div.className   = "mensaje " + tipo;
    }
  </script>

</body>
</html>
