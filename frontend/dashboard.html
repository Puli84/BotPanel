<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BotPanel — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      background: #111827;
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      padding: 24px 12px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      padding: 0 8px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 16px;
    }

    .logo span { color: #25d366; }

    .nav-item {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: #64748b;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 4px;
      transition: all 0.15s;
    }

    .nav-item:hover { background: #1a2235; color: #e2e8f0; }
    .nav-item.activo { background: rgba(37,211,102,0.1); color: #25d366; }

    .sidebar-bottom {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 16px;
    }

    .usuario-info {
      font-size: 13px;
      padding: 0 8px 12px;
    }

    .usuario-nombre { font-weight: bold; margin-bottom: 2px; }
    .usuario-rol {
      font-size: 11px;
      color: #25d366;
      background: rgba(37,211,102,0.1);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .btn-salir {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
    }

    .btn-salir:hover { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.3); }

    /* ── CONTENIDO ── */
    .contenido {
      margin-left: 220px;
      flex: 1;
      padding: 32px;
    }

    .titulo-pagina {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .subtitulo-pagina {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ── TARJETAS DE STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-icono { font-size: 24px; margin-bottom: 12px; }
    .stat-valor {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .stat-etiqueta { font-size: 12px; color: #64748b; }

    /* ── SECCIÓN ── */
    .seccion {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .seccion-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-weight: bold;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    td {
      padding: 14px 20px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-verde { background: rgba(37,211,102,0.15); color: #25d366; }
    .badge-azul  { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .badge-rojo  { background: rgba(239,68,68,0.15);  color: #ef4444; }

    .cargando { padding: 32px; text-align: center; color: #64748b; }

    .btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-verde { background: #25d366; color: #000; }
    .btn-verde:hover { background: #1db954; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Bot<span>Panel</span></div>

    <a href="dashboard.html" class="nav-item activo">⚡ Dashboard</a>
    <a href="empresas.html"  class="nav-item" id="linkEmpresas">🏢 Empresas</a>
    <a href="bots.html"      class="nav-item">🤖 Bots</a>
    <a href="metricas.html"    class="nav-item">📊 Métricas</a>
<a href="solicitudes.html" class="nav-item">📋 Solicitudes</a>

    <div class="sidebar-bottom">
      <div class="usuario-info">
        <div class="usuario-nombre" id="nombreUsuario">...</div>
        <span class="usuario-rol" id="rolUsuario">...</span>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </aside>

  <!-- CONTENIDO -->
  <main class="contenido">
    <div class="titulo-pagina">Dashboard</div>
    <div class="subtitulo-pagina">Resumen general de tu plataforma</div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-icono">🏢</div>
        <div class="stat-valor" id="totalEmpresas">-</div>
        <div class="stat-etiqueta">Empresas registradas</div>
      </div>
      <div class="stat">
        <div class="stat-icono">🤖</div>
        <div class="stat-valor" id="totalBots">-</div>
        <div class="stat-etiqueta">Bots configurados</div>
      </div>
      <div class="stat">
        <div class="stat-icono">✅</div>
        <div class="stat-valor" id="botsActivos">-</div>
        <div class="stat-etiqueta">Bots activos</div>
      </div>
      <div class="stat">
        <div class="stat-icono">👤</div>
        <div class="stat-valor" id="rolActual">-</div>
        <div class="stat-etiqueta">Tu rol</div>
      </div>
    </div>

    <!-- Tabla empresas (solo si es SuperAdmin) -->
    <div class="seccion" id="seccionEmpresas">
      <div class="seccion-header">
        🏢 Empresas registradas
        <a href="empresas.html" class="btn btn-verde">Gestionar →</a>
      </div>
      <div id="tablaEmpresas" class="cargando">Cargando...</div>
    </div>

    <!-- Tabla bots -->
    <div class="seccion">
      <div class="seccion-header">
        🤖 Mis bots
        <a href="bots.html" class="btn btn-verde">Gestionar →</a>
      </div>
      <div id="tablaBots" class="cargando">Cargando...</div>
    </div>

  </main>

  <script src="auth.js"></script>
  <script>
    // Al cargar la página, verificamos que hay sesión
    window.onload = async () => {
      if (!verificarSesion()) return;

      const usuario = getUsuario();

      // Mostramos datos del usuario en el sidebar
      document.getElementById("nombreUsuario").textContent = usuario.nombre;
      document.getElementById("rolUsuario").textContent    = usuario.rol;
      document.getElementById("rolActual").textContent     = usuario.rol;

      // Si no es SuperAdmin, ocultamos la sección de empresas
      if (!esSuperAdmin()) {
        document.getElementById("seccionEmpresas").style.display = "none";
        document.getElementById("linkEmpresas").style.display    = "none";
      }

      cargarDatos();
    };

    async function cargarDatos() {
      await cargarEmpresas();
      await cargarBots();
    }

    // ── Carga las empresas desde la API ──
    async function cargarEmpresas() {
      if (!esSuperAdmin()) return;

      try {
        const respuesta = await apiFetch("/api/empresas");
        const empresas  = await respuesta.json();

        document.getElementById("totalEmpresas").textContent = empresas.length;

        if (empresas.length === 0) {
          document.getElementById("tablaEmpresas").innerHTML =
            '<p style="padding:20px;color:#64748b">No hay empresas registradas todavía.</p>';
          return;
        }

        // Construimos la tabla HTML dinámicamente
        let html = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Fecha alta</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
        `;

        empresas.forEach(e => {
          html += `
            <tr>
              <td>${e.id}</td>
              <td><strong>${e.nombre}</strong></td>
              <td>${e.email}</td>
              <td>${e.creadoEn}</td>
              <td><span class="badge badge-verde">Activa</span></td>
            </tr>
          `;
        });

        html += "</tbody></table>";
        document.getElementById("tablaEmpresas").innerHTML = html;

      } catch (error) {
        document.getElementById("tablaEmpresas").innerHTML =
          '<p style="padding:20px;color:#ef4444">Error al cargar empresas.</p>';
      }
    }

    // ── Carga los bots desde la API ──
    async function cargarBots() {
      try {
        const respuesta = await apiFetch("/api/bots");
        const bots      = await respuesta.json();

        document.getElementById("totalBots").textContent   = bots.length;
        document.getElementById("botsActivos").textContent = bots.filter(b => b.activo).length;

        if (bots.length === 0) {
          document.getElementById("tablaBots").innerHTML =
            '<p style="padding:20px;color:#64748b">No hay bots configurados todavía.</p>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Número WhatsApp</th>
                <th>Empresa</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
        `;

        bots.forEach(b => {
          const estadoBadge = b.activo
            ? '<span class="badge badge-verde">Activo</span>'
            : '<span class="badge badge-rojo">Inactivo</span>';

          html += `
            <tr>
              <td><strong>${b.nombre}</strong></td>
              <td>${b.numeroWhatsapp || '—'}</td>
              <td>${b.empresaNombre}</td>
              <td>${estadoBadge}</td>
            </tr>
          `;
        });

        html += "</tbody></table>";
        document.getElementById("tablaBots").innerHTML = html;

      } catch (error) {
        document.getElementById("tablaBots").innerHTML =
          '<p style="padding:20px;color:#ef4444">Error al cargar bots.</p>';
      }
    }
  </script>

</body>
</html>
