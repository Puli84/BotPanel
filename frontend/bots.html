<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BotPanel — Bots</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0a0e1a; color: #e2e8f0; display: flex; min-height: 100vh; }

    .sidebar { width: 220px; background: #111827; border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; padding: 24px 12px; }
    .logo { font-size: 22px; font-weight: bold; padding: 0 8px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
    .logo span { color: #25d366; }
    .nav-item { display: block; padding: 10px 12px; border-radius: 8px; color: #64748b; text-decoration: none; font-size: 14px; margin-bottom: 4px; }
    .nav-item:hover { background: #1a2235; color: #e2e8f0; }
    .nav-item.activo { background: rgba(37,211,102,0.1); color: #25d366; }
    .sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.07); padding-top: 16px; }
    .usuario-info { font-size: 13px; padding: 0 8px 12px; }
    .usuario-nombre { font-weight: bold; margin-bottom: 2px; }
    .usuario-rol { font-size: 11px; color: #25d366; background: rgba(37,211,102,0.1); display: inline-block; padding: 2px 8px; border-radius: 10px; }
    .btn-salir { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #64748b; border-radius: 8px; padding: 8px; cursor: pointer; font-size: 13px; margin-top: 8px; }
    .btn-salir:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    .contenido { margin-left: 220px; flex: 1; padding: 32px; }
    .header-pagina { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .titulo-pagina { font-size: 24px; font-weight: bold; }
    .subtitulo-pagina { color: #64748b; font-size: 14px; margin-top: 4px; }

    .btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-verde  { background: #25d366; color: #000; }
    .btn-verde:hover  { background: #1db954; }
    .btn-rojo   { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); font-size: 12px; padding: 6px 12px; }
    .btn-gris   { background: rgba(255,255,255,0.05); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); font-size: 12px; padding: 6px 12px; }

    /* Grid de cards de bots */
    .bots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .bot-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.15s;
    }

    .bot-card:hover { border-color: rgba(37,211,102,0.3); }

    .bot-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .bot-icono { font-size: 32px; }
    .bot-nombre { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .bot-numero { font-size: 12px; color: #64748b; }

    .bot-toggle {
      margin-left: auto;
      width: 40px; height: 22px;
      background: #1a2235;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .bot-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      background: #64748b;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .bot-toggle.on { background: rgba(37,211,102,0.2); border-color: #25d366; }
    .bot-toggle.on::after { left: 20px; background: #25d366; }

    .bot-stats { display: flex; gap: 20px; margin: 12px 0; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.07); border-bottom: 1px solid rgba(255,255,255,0.07); }
    .bot-stat-val { font-size: 20px; font-weight: bold; }
    .bot-stat-lbl { font-size: 11px; color: #64748b; }

    .bot-empresa { font-size: 12px; color: #64748b; margin-bottom: 14px; }

    .bot-acciones { display: flex; gap: 8px; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .badge-verde { background: rgba(37,211,102,0.15); color: #25d366; }
    .badge-rojo  { background: rgba(239,68,68,0.15);  color: #ef4444; }

    .cargando { padding: 32px; text-align: center; color: #64748b; }
    .vacio { padding: 48px; text-align: center; color: #64748b; }
    .vacio-icono { font-size: 48px; margin-bottom: 16px; }

    /* MODAL */
    .modal-fondo { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal-fondo.visible { display: flex; }
    .modal { background: #111827; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 32px; width: 100%; max-width: 420px; }
    .modal h2 { font-size: 18px; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #64748b; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    input, textarea { width: 100%; background: #1a2235; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; font-family: Arial; }
    input:focus, textarea:focus { border-color: #25d366; }
    textarea { resize: vertical; min-height: 80px; }
    .modal-botones { display: flex; gap: 10px; margin-top: 24px; }
    .btn-cancelar { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #64748b; padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .mensaje { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
    .mensaje.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; display: block; }
    .mensaje.exito { background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.3); color: #25d366; display: block; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">Bot<span>Panel</span></div>
    <a href="dashboard.html" class="nav-item">⚡ Dashboard</a>
    <a href="empresas.html"  class="nav-item" id="linkEmpresas">🏢 Empresas</a>
    <a href="bots.html"      class="nav-item activo">🤖 Bots</a>
    <a href="metricas.html"    class="nav-item">📊 Métricas</a>
<a href="solicitudes.html" class="nav-item">📋 Solicitudes</a>
    <div class="sidebar-bottom">
      <div class="usuario-info">
        <div class="usuario-nombre" id="nombreUsuario">...</div>
        <span class="usuario-rol" id="rolUsuario">...</span>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </aside>

  <main class="contenido">
    <div class="header-pagina">
      <div>
        <div class="titulo-pagina">🤖 Bots</div>
        <div class="subtitulo-pagina">Gestiona tus bots de WhatsApp</div>
      </div>
      <button class="btn btn-verde" id="btnNuevoBot" onclick="abrirModal()">+ Nuevo bot</button>
    </div>

    <div id="contenedorBots" class="cargando">Cargando...</div>
  </main>

  <!-- MODAL: Nuevo bot -->
  <div class="modal-fondo" id="modalFondo">
    <div class="modal">
      <h2>🤖 Nuevo bot</h2>

      <label>Nombre del bot</label>
      <input id="botNombre" placeholder="Ej: Bot Reservas" />

      <label>Número de WhatsApp Business</label>
      <input id="botNumero" placeholder="Ej: +34600123456" />

      <label>Mensaje de bienvenida</label>
      <textarea id="botBienvenida" placeholder="Ej: ¡Hola! Bienvenido, ¿en qué puedo ayudarte?"></textarea>

      <div class="mensaje" id="mensajeModal"></div>

      <div class="modal-botones">
        <button class="btn btn-verde" onclick="crearBot()">Crear bot</button>
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    window.onload = async () => {
      if (!verificarSesion()) return;
      const u = getUsuario();
      document.getElementById("nombreUsuario").textContent = u.nombre;
      document.getElementById("rolUsuario").textContent    = u.rol;

      // El SuperAdmin no puede crear bots directamente (los crea cada empresa)
      if (esSuperAdmin()) {
        document.getElementById("btnNuevoBot").style.display = "none";
      } else {
        document.getElementById("linkEmpresas").style.display = "none";
      }

      cargarBots();
    };

    async function cargarBots() {
      const respuesta = await apiFetch("/api/bots");
      const bots      = await respuesta.json();

      if (bots.length === 0) {
        document.getElementById("contenedorBots").innerHTML = `
          <div class="vacio">
            <div class="vacio-icono">🤖</div>
            <div style="font-size:16px;font-weight:bold;color:#e2e8f0;margin-bottom:8px">No hay bots todavía</div>
            <div>Crea tu primer bot con el botón de arriba</div>
          </div>
        `;
        return;
      }

      let html = '<div class="bots-grid">';

      bots.forEach(b => {
        const toggleClass = b.activo ? "bot-toggle on" : "bot-toggle";
        const estadoBadge = b.activo
          ? '<span class="badge badge-verde">Activo</span>'
          : '<span class="badge badge-rojo">Inactivo</span>';

        html += `
          <div class="bot-card" id="card-${b.id}">
            <div class="bot-card-header">
              <div class="bot-icono">🤖</div>
              <div>
                <div class="bot-nombre">${b.nombre}</div>
                <div class="bot-numero">${b.numeroWhatsapp || 'Sin número'}</div>
              </div>
              <div class="${toggleClass}" onclick="toggleBot(${b.id})" title="Activar/Desactivar"></div>
            </div>

            <div class="bot-empresa">🏢 ${b.empresaNombre}</div>

            ${estadoBadge}

            <div class="bot-stats">
              <div>
                <div class="bot-stat-val">${b.totalConversaciones}</div>
                <div class="bot-stat-lbl">Conversaciones</div>
              </div>
            </div>

            <div class="bot-acciones">
              <button class="btn btn-verde" style="font-size:12px;padding:6px 12px;" onclick="window.location.href='config-bot.html'">⚙️ Configurar</button>
              <button class="btn btn-rojo" onclick="eliminarBot(${b.id}, '${b.nombre}')">Eliminar</button>
            </div>
        `;
      });

      html += '</div>';
      document.getElementById("contenedorBots").innerHTML = html;
    }

    async function toggleBot(id) {
      const respuesta = await apiFetch(`/api/bots/${id}/toggle`, { method: "PATCH" });
      if (respuesta.ok) {
        cargarBots(); // recargamos para actualizar el estado visual
      }
    }

    async function eliminarBot(id, nombre) {
      if (!confirm(`¿Eliminar el bot "${nombre}"?`)) return;
      const respuesta = await apiFetch(`/api/bots/${id}`, { method: "DELETE" });
      if (respuesta.ok) {
        cargarBots();
      }
    }

    async function crearBot() {
      const datos = {
        nombre:           document.getElementById("botNombre").value,
        numeroWhatsapp:   document.getElementById("botNumero").value,
        mensajeBienvenida: document.getElementById("botBienvenida").value
      };

      if (!datos.nombre) {
        mostrarMensajeModal("El nombre del bot es obligatorio", "error");
        return;
      }

      const respuesta = await apiFetch("/api/bots", {
        method: "POST",
        body: JSON.stringify(datos)
      });

      const resultado = await respuesta.json();

      if (respuesta.ok) {
        mostrarMensajeModal("✅ Bot creado correctamente", "exito");
        setTimeout(() => { cerrarModal(); cargarBots(); }, 1500);
      } else {
        mostrarMensajeModal(resultado.error || "Error al crear el bot", "error");
      }
    }

    function abrirModal()  { document.getElementById("modalFondo").classList.add("visible"); }
    function cerrarModal() { document.getElementById("modalFondo").classList.remove("visible"); }

    function mostrarMensajeModal(texto, tipo) {
      const div = document.getElementById("mensajeModal");
      div.textContent = texto;
      div.className   = "mensaje " + tipo;
    }
  </script>

</body>
</html>
